name = "pdo-kanban-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "pdo-kanban-db"
database_id = "e642b9ea-492c-4667-b164-e484effc2cd4"
migrations_dir = "../migrations"

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "pdo-kanban-attachments"

[vars]
FRONTEND_URL = "https://pdo-kanban.pages.dev"

# Secrets (set via `wrangler secret put`):
# JWT_SECRET
# EMAIL_API_KEY
